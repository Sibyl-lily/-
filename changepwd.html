<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <style>
        .header {
            height: 60px;
            background: #87CEEB;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 24px;
            position: relative;
        }

        .nav-links {
            position: absolute;
            right: 20px;
            top: 0;
            font-size: 14px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .form-container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ffd6d6;
            border-radius: 5px;
        }

        .form-item {
            margin-bottom: 15px;
        }

        .form-item label {
            display: inline-block;
            width: 70px;
            text-align: right;
            margin-right: 10px;
        }

        .form-item input {
            width: 280px;
            height: 30px;
            border: 1px solid #ddd;
            padding: 0 10px;
        }

        .submit-btn {
            width: 100%;
            height: 35px;
            background: #87CEEB;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        input::placeholder {
            color: #999;
        }

        .confirm-pwd {
            display: inline-block;
            width: 70px;
            text-align: right;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="header">修改密码<div class="nav-links">
            <a href="./user.html">个人中心</a>
            <a href="./index.html">回到首页</a>
        </div>
    </div>

    <div class="form-container">
        <div class="form-item">
            <label>原密码：</label>
            <input type="password" id="oldPassword" placeholder="请输入原密码">
        </div>
        <div class="form-item">
            <label>新密码：</label>
            <input type="password" id="newPassword" placeholder="请输入新密码">
        </div>
        <div class="form-item">
            <label>确认密码:</label>
            <input type="password" id="rNewPassword" placeholder="请确认新密码">
        </div>
        <button class="submit-btn" onclick="changePwd()">确认修改</button>
    </div>

    <script src="./相关资料/lib/axios.min.js"></script>
    <script src="./js/changepwd.js"></script>
</body>
</html>
