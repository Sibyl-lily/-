<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <style>
        .header {
            height: 60px;
            background: #87CEEB;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 24px;
            position: relative;
        }

        .nav-links {
            position: absolute;
            right: 20px;
            top: 0;
            font-size: 14px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .form-container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ffd6d6;
            border-radius: 5px;
        }

        .form-item {
            margin-bottom: 15px;
        }

        .form-item label {
            display: inline-block;
            width: 70px;
            text-align: right;
            margin-right: 10px;
        }

        .form-item input,
        .form-item select {
            width: 280px;
            height: 30px;
            border: 1px solid #ddd;
            padding: 0 10px;
        }

        .submit-btn {
            width: 100%;
            height: 35px;
            background: #87CEEB;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        个人中心
        <div class="nav-links">
            <a href="./changepwd.html">修改密码</a>
            <a href="./index.html">回到首页</a>
        </div>
    </div>

    <div class="form-container">
        <div class="form-item">
            <label>用户名：</label>
            <input type="text" id="username" disabled>
        </div>
        <div class="form-item">
            <label>昵称：</label>
            <input type="text" id="nickname">
        </div>
        <div class="form-item">
            <label>性别：</label>
            <select id="gender">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-item">
            <label>年龄：</label>
            <input type="number" id="age">
        </div>
        <button class="submit-btn" onclick="saveUserInfo()">确认修改</button>
    </div>

    <script src="./相关资料/lib/axios.min.js"></script>
    <script src="./js/user.js"></script>
</body>
</html>
