<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录页面</title>
    <style>
        .page-title {
            height: 60px;
            background: #87CEEB;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 24px;
        }

        .form-container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ffd6d6;
            border-radius: 5px;
        }

        .form-item {
            margin-bottom: 15px;
        }

        .form-item label {
            display: inline-block;
            width: 70px;
            text-align: right;
            margin-right: 10px;
        }

        .form-item input {
            width: 280px;
            height: 30px;
            border: 1px solid #ddd;
            padding: 0 10px;
        }

        .form-footer {
            margin-top: 15px;
            font-size: 14px;
        }

        .form-footer a {
            color: #87CEEB;
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            height: 35px;
            background: #87CEEB;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="page-title">登录页面</div>
    
    <div class="form-container">
        <form onsubmit="return login(event)">
            <div class="form-item">
                <label>用户名：</label>
                <input type="text" id="username" name="username">
            </div>
            <div class="form-item">
                <label>密 码：</label>
                <input type="password" id="password" name="password">
            </div>
            <div class="form-footer">
                <span>还没账号，<a href="./register.html">去注册</a></span>
            </div>
            <button type="submit" class="submit-btn">登录</button>
        </form>
    </div>

    <script src="./相关资料/lib/axios.min.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
