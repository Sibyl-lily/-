<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册页面</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/form.css">
    <style>
        .form-container {
            width: 400px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .form-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .form-item label {
            width: 80px;
            text-align: right;
            padding-right: 10px;
        }
        
        .form-item input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .form-footer {
            text-align: center;
            margin: 10px 0;
        }
        
        .form-footer a {
            color: #007bff;
            text-decoration: none;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .submit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="page-title">注册页面</div>
    
    <div class="form-container">
        <div class="form-item">
            <label>用户名:</label>
            <input type="text" id="username">
        </div>
        <div class="form-item">
            <label>密 码:</label>
            <input type="password" id="password">
        </div>
        <div class="form-item">
            <label>确认密码:</label>
            <input type="password" id="rpassword">
        </div>
        <div class="form-item">
            <label>昵 称:</label>
            <input type="text" id="nickname">
        </div>
        <div class="form-footer">
            <span>已有账号，<a href="./login.html">直接登录</a></span>
        </div>
        <button class="submit-btn" onclick="register()">注册</button>
    </div>

    <script src="./相关资料/lib/axios.min.js"></script>
    <script src="./js/register.js"></script>
</body>
</html>
